<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Apocalypse - Survival Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="infoPanel">
            <div id="playerInfo">
                <span id="playerNameDisplay">Guest</span>
                <button id="changeNameBtn">Register</button>
            </div>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="registerModal" class="modal hidden">
        <div class="modal-content">
            <h3>Enter Username</h3>
            <input id="usernameInput" type="text" maxlength="16" placeholder="Your name" />
            <div class="modal-actions">
                <button id="saveNameBtn">Save</button>
                <button id="closeRegisterBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
