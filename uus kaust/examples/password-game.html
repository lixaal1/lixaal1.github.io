<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Game</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #1abc9c;
            --button-bg: #2a2a2a;
            --button-hover: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h2 { margin-bottom: 1rem; font-weight: 300; }
        p.subtitle { font-size:0.9rem; color:#777; margin-bottom:1.5rem; }

        #password-display {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 40px;
            margin-bottom: 1rem;
        }

        .char-box {
            width: 24px;
            height: 24px;
            background: #2a2a2a;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text);
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(30px,1fr));
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .palette button {
            padding: 6px;
            background: var(--button-bg);
            border: none;
            border-radius: 4px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .palette button:hover { background: var(--button-hover); }

        .status-text {
            font-size: 0.9rem;
            margin-top:0.5rem;
            color: var(--accent);
        }

        #controls {
            margin-top: 1rem;
        }
        #controls button {
            padding: 8px 16px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #121212;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Password Game</h2>
    <p class="subtitle">Loo parool, vaata kui kaua kuluks seda murda.<br>Klõpsa tähti kataloogist.</p>

    <div id="password-display"></div>
    <div class="status-text" id="crack-time">Murda aeg: -</div>

    <div class="palette" id="palette"></div>

    <div id="controls">
        <button id="resetBtn">Reset</button>
        <button id="backBtn">Tagasi analüsaatori</button>
    </div>
</div>

<script>
    // build character palette (lower, upper, digits, symbols)
    const chars = [];
    for(let i=97;i<=122;i++) chars.push(String.fromCharCode(i)); // a-z
    for(let i=65;i<=90;i++) chars.push(String.fromCharCode(i)); // A-Z
    for(let i=48;i<=57;i++) chars.push(String.fromCharCode(i)); // 0-9
    chars.push('!','@','#','$','%','^','&','*','(',')','-','_','+','=');

    const paletteEl = document.getElementById('palette');
    chars.forEach(c=>{
        const btn = document.createElement('button');
        btn.textContent = c;
        btn.onclick = ()=>addChar(c);
        paletteEl.appendChild(btn);
    });

    const displayEl = document.getElementById('password-display');
    let current = '';

    function addChar(ch) {
        current += ch;
        updateDisplay();
    }

    // allow removing last character via Backspace key
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
            e.preventDefault();
            current = current.slice(0, -1);
            updateDisplay();
        }
    });

    function updateDisplay() {
        displayEl.innerHTML = '';
        current.split('').forEach(ch=>{
            const box = document.createElement('div');
            box.className = 'char-box';
            box.textContent = ch;
            displayEl.appendChild(box);
        });
        updateCrackTime();
    }

    function updateCrackTime() {
        const crackEl = document.getElementById('crack-time');
        if(current.length===0) {
            crackEl.innerText = 'Murda aeg: -';
            return;
        }
        const combos = Math.pow(94, current.length);
        const seconds = combos / 1e11;
        function formatSec(s) {
            if (s < 60) return s.toFixed(2) + ' s';
            const m = Math.floor(s/60);
            if (m < 60) return m + ' min';
            const h = Math.floor(m/60);
            if (h < 24) return h + ' h';
            const d = Math.floor(h/24);
            if (d < 365) return d + ' d';
            const y = (d/365).toFixed(1);
            return y + ' a';
        }
        crackEl.innerText = 'Murda aeg: ' + formatSec(seconds);
    }

    document.getElementById('resetBtn').addEventListener('click',()=>{
        current=''; updateDisplay();
    });
    document.getElementById('backBtn').addEventListener('click',()=>{
        window.location.href = 'example7.html';
    });
</script>

</body>
</html>
